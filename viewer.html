<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家族投資組合</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efe8;
  --text: #1a1a18; --text2: #6b6b66; --text3: #9e9e99;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --pos: #1D9E75; --neg: #D85A30;
  --rad-md: 8px; --rad-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b; --text: #f0efe8; --text2: #9e9e99; --text3: #6b6b66; --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18); }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
.page { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
.top-bar h1 { font-size: 20px; font-weight: 500; }
.top-right { display: flex; align-items: center; gap: 10px; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: var(--rad-md); font-size: 13px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); }
.btn:hover { background: var(--bg2); }
.status { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
.sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--pos); flex-shrink: 0; }
.sdot.err { background: var(--neg); }
.ro-badge { background: #E1F5EE; color: #085041; font-size: 11px; padding: 2px 8px; border-radius: var(--rad-md); font-weight: 500; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: var(--bg); border-radius: var(--rad-md); padding: .9rem 1rem; border: 0.5px solid var(--border); }
.metric .lbl { font-size: 12px; color: var(--text2); margin-bottom: 5px; }
.metric .val { font-size: 20px; font-weight: 500; }
.metric .sub { font-size: 12px; margin-top: 3px; }
.pos { color: var(--pos); } .neg { color: var(--neg); } .neu { color: var(--text2); }
.sec-title { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 10px; }
.acc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.acc-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--rad-lg); padding: 1rem 1.1rem; }
.acc-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 13px; flex-shrink: 0; }
.av-b { background: #E6F1FB; color: #0C447C; } .av-t { background: #E1F5EE; color: #085041; } .av-a { background: #FAEEDA; color: #633806; }
.acc-name { font-size: 14px; font-weight: 500; } .acc-sub { font-size: 11px; color: var(--text2); }
.acc-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.acc-row .k { font-size: 12px; color: var(--text2); } .acc-row .v { font-size: 13px; font-weight: 500; }
.divider { border: none; border-top: 0.5px solid var(--border); margin: 10px 0; }
.op-box { background: #FAEEDA; border-radius: var(--rad-md); padding: 8px 10px; margin-top: 8px; }
.op-box .olbl { font-size: 11px; color: #633806; margin-bottom: 2px; }
.op-box .oval { font-size: 14px; font-weight: 500; }
.my-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--rad-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
.my-panel-head { display: flex; align-items: center; margin-bottom: 12px; }
.my-panel-head h2 { font-size: 15px; font-weight: 500; }
.op-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 8px; }
.op-m { background: var(--bg2); border-radius: var(--rad-md); padding: .7rem .9rem; }
.op-m .lbl { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.op-m .val { font-size: 16px; font-weight: 500; }
.toolbar { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
.tab { padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; color: var(--text2); border: none; background: transparent; }
.tab.active { background: var(--bg); color: var(--text); font-weight: 500; box-shadow: 0 0 0 0.5px var(--border2); }
.tbl-wrap { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--rad-lg); overflow: hidden; margin-bottom: 2rem; overflow-x: auto; }
table { width: 100%; min-width: 560px; border-collapse: collapse; font-size: 12px; }
th { background: var(--bg2); padding: 7px 10px; text-align: left; font-weight: 500; color: var(--text2); font-size: 11px; border-bottom: 0.5px solid var(--border); }
th.r, td.r { text-align: right; }
td { padding: 9px 10px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg2); }
.badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; font-weight: 500; vertical-align: middle; }
.tw-b { background: #E1F5EE; color: #085041; } .us-b { background: #E6F1FB; color: #0C447C; } .op-b { background: #FAEEDA; color: #633806; } .dca-b { background:#F0E6FB; color:#5B0CAC; }
tr.group-row{cursor:pointer} tr.detail-row td{background:var(--bg2);font-size:11px;color:var(--text2);padding:5px 10px}.expand-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:0 4px;transition:transform .2s}.expand-btn.open{transform:rotate(90deg)}
.empty { text-align: center; color: var(--text3); padding: 3rem; }
.spin { animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.footer { text-align: center; font-size: 12px; color: var(--text3); margin-top: 1rem; }
.auto-badge { font-size: 11px; color: var(--text3); }
</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <h1>家族投資組合 <span class="ro-badge">查看</span></h1>
  <div class="top-right">
    <div class="status"><span class="sdot" id="sdot"></span><span id="stxt">載入中...</span></div>
    <button class="btn" onclick="init()"><span id="ricon">↻</span> 重新整理</button>
  </div>
</div>

<div class="summary-grid">
  <div class="metric"><div class="lbl">總資產（台幣）</div><div class="val" id="s-total">—</div></div>
  <div class="metric"><div class="lbl">總損益</div><div class="val" id="s-pnl">—</div><div class="sub" id="s-pct"></div></div>
  <div class="metric"><div class="lbl">持股檔數</div><div class="val" id="s-count">—</div><div class="sub" id="s-mkt"></div></div>
  <div class="metric"><div class="lbl">上次更新</div><div class="val" style="font-size:13px" id="s-time">—</div></div>
</div>

<div class="my-panel">
  <div class="my-panel-head"><span style="margin-right:8px">📈</span><h2>爸爸帳戶標記績效</h2></div>
  <div class="op-grid">
    <div class="op-m"><div class="lbl">投入成本</div><div class="val" id="op-cost">—</div></div>
    <div class="op-m"><div class="lbl">現在市值</div><div class="val" id="op-val">—</div></div>
    <div class="op-m"><div class="lbl">標記損益</div><div class="val" id="op-pnl">—</div><div style="font-size:11px;margin-top:2px" id="op-pct"></div></div>
  </div>
  <div style="font-size:11px;color:var(--text2)">只計算後台標記納入績效的持股批次</div>
</div>

<div class="sec-title">各帳戶概況</div>
<div class="acc-grid">
  <div class="acc-card">
    <div class="acc-head"><div class="avatar av-b">爸</div><div><div class="acc-name">爸爸</div><div class="acc-sub" id="a-dad-n">0 檔</div></div></div>
    <div class="acc-row"><span class="k">市值</span><span class="v" id="a-dad-val">—</span></div>
    <div class="acc-row"><span class="k">全帳損益</span><span class="v" id="a-dad-pnl">—</span></div>
    <hr class="divider">
    <div class="op-box"><div class="olbl">標記持股部分</div><div class="oval" id="a-dad-op">—</div></div>
  </div>
  <div class="acc-card">
    <div class="acc-head"><div class="avatar av-t">媽</div><div><div class="acc-name">媽媽</div><div class="acc-sub" id="a-mom-n">0 檔</div></div></div>
    <div class="acc-row"><span class="k">市值</span><span class="v" id="a-mom-val">—</span></div>
    <div class="acc-row"><span class="k">損益</span><span class="v" id="a-mom-pnl">—</span></div>
    <hr class="divider">
    <div class="acc-row"><span class="k">成本</span><span class="v" id="a-mom-cost">—</span></div>
  </div>
  <div class="acc-card">
    <div class="acc-head"><div class="avatar av-a">我</div><div><div class="acc-name">我</div><div class="acc-sub" id="a-me-n">0 檔</div></div></div>
    <div class="acc-row"><span class="k">市值</span><span class="v" id="a-me-val">—</span></div>
    <div class="acc-row"><span class="k">損益</span><span class="v" id="a-me-pnl">—</span></div>
    <hr class="divider">
    <div class="acc-row"><span class="k">成本</span><span class="v" id="a-me-cost">—</span></div>
  </div>
</div>

<div class="sec-title">持股明細</div>
<div class="toolbar">
  <button class="tab active" onclick="filter('all',this)">全部</button>
  <button class="tab" onclick="filter('tw',this)">台股</button>
  <button class="tab" onclick="filter('us',this)">美股</button>
</div>
<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:32px"></th><th>股票</th><th class="r">現價</th><th class="r">加權成本</th><th class="r">總股數</th>
        <th class="r">市值(台幣)</th><th class="r">損益(台幣)</th><th class="r">損益%</th><th>持有人</th>
      </tr>
    </thead>
    <tbody id="tbody"><tr><td colspan="9" class="empty">載入中...</td></tr></tbody>
  </table>
</div>

<div class="footer">報價每 5 分鐘自動更新・僅供參考・不構成投資建議</div>

</div>
<script>
const SUPABASE_URL = 'https://nqauumyfpdqkkqfjxury.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xYXV1bXlmcGRxa2txZmp4dXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1Mjk4MDYsImV4cCI6MjA5NTEwNTgwNn0.j-Ql0_eDLiCLRDyEzbzjVtq4mw7ORdk9eLniDR7zyow';
const RATE = 32.5;

const TW_NAME_MAP={
  '0050':'元大台灣50','0056':'元大高股息','006208':'富邦台50','00713':'元大台灣高息低波','00878':'國泰永續高股息','00919':'群益台灣精選高息','00929':'復華台灣科技優息','00940':'元大台灣價值高息','00922':'國泰台灣領袖50','00923':'群益台ESG低碳50','00927':'群益半導體收益','00932':'兆豐永續高息等權','00934':'中信成長高股息','00939':'統一台灣高息動能','00941':'中信上游半導體','00944':'野村趨勢動能高息','00946':'群益科技高息成長','00947':'台新臺灣IC設計','00952':'凱基台灣AI50','00953B':'群益優選非投等債','00679B':'元大美債20年','00687B':'國泰20年美債','00720B':'元大投資級公司債','00725B':'國泰投資級公司債','00795B':'中信美國公債20年','00857B':'永豐20年美公債',
  '1101':'台泥','1102':'亞泥','1216':'統一','1301':'台塑','1303':'南亞','1326':'台化','1402':'遠東新','1590':'亞德客-KY','2002':'中鋼','2207':'和泰車','2301':'光寶科','2303':'聯電','2308':'台達電','2317':'鴻海','2327':'國巨','2330':'台積電','2345':'智邦','2357':'華碩','2379':'瑞昱','2382':'廣達','2395':'研華','2408':'南亞科','2412':'中華電','2454':'聯發科','2603':'長榮','2609':'陽明','2615':'萬海','2801':'彰銀','2880':'華南金','2881':'富邦金','2882':'國泰金','2883':'開發金','2884':'玉山金','2885':'元大金','2886':'兆豐金','2887':'台新金','2890':'永豐金','2891':'中信金','2892':'第一金','2912':'統一超','3008':'大立光','3034':'聯詠','3045':'台灣大','3231':'緯創','3661':'世芯-KY','3711':'日月光投控','4904':'遠傳','4938':'和碩','5871':'中租-KY','5876':'上海商銀','5880':'合庫金','6505':'台塑化','6669':'緯穎','6770':'力積電','8046':'南電','8069':'元太','8454':'富邦媒','8996':'高力'
};
function twName(ticker){return TW_NAME_MAP[String(ticker).toUpperCase()]||'';}
function displayName(ticker,market,storedName,sym){
  if(storedName&&String(storedName).trim())return storedName;
  if(market==='tw')return twName(ticker)||'';
  return quoteNames[sym]||'';
}

let stocks = [], prices = {}, quoteNames = {}, curFilter = 'all', expandedGroups = {};

async function loadStocks() {
  const r = await fetch(SUPABASE_URL + '/rest/v1/stocks?select=*&order=created_at.asc', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  stocks = await r.json();
}

function getSymbol(s) { return s.market === 'tw' ? s.ticker + '.TW' : s.ticker; }
function getMV(s) { const p = prices[getSymbol(s)]; if (!p) return null; return (s.market==='us'?p*RATE:p)*s.shares; }
function getCostTWD(s) { return (s.market==='us'?s.cost*RATE:s.cost)*s.shares; }
function fmt(n) { return Math.round(n).toLocaleString('zh-TW'); }
function pnlCls(v) { return v >= 0 ? 'pos' : 'neg'; }
function sign(v) { return v >= 0 ? '+' : ''; }
function formatDate(v){ if(!v) return '未填日期'; return String(v).slice(0,10); }
function dcaChecked(s){ return s.is_dca===true || s.is_dca==='true'; }
function g(id) { return document.getElementById(id); }

async function fetchJson(url){
  try{const r=await fetch(url);if(!r.ok)throw new Error('direct failed');return await r.json();}
  catch(e){const pr=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url));if(!pr.ok)throw new Error('proxy failed');return await pr.json();}
}
async function fetchText(url){
  try{const r=await fetch(url);if(!r.ok)throw new Error('direct failed');return await r.text();}
  catch(e){const pr=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url));if(!pr.ok)throw new Error('proxy failed');return await pr.text();}
}
function cleanPrice(v){
  if(v==null)return null;
  const n=parseFloat(String(v).replace(/,/g,''));
  return isNaN(n)||n<=0?null:n;
}
async function fetchTWQuote(ticker){
  const codes=['tse_'+ticker+'.tw','otc_'+ticker+'.tw'];
  for(const code of codes){
    try{
      const url='https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch='+encodeURIComponent(code)+'&json=1&delay=0';
      const d=await fetchJson(url);
      const item=d.msgArray&&d.msgArray[0];
      if(item){
        const price=cleanPrice(item.z)||cleanPrice(item.y)||cleanPrice(item.o);
        if(price){return{price,name:item.n||item.nf||ticker,source:code.startsWith('tse_')?'證交所':'櫃買中心'};}
      }
    }catch(e){}
  }
  try{
    const sym=ticker+'.TW';
    const d=await fetchJson('https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&range=1d');
    const m=d.chart&&d.chart.result&&d.chart.result[0]&&d.chart.result[0].meta;
    const price=m&&(m.regularMarketPrice||m.previousClose);
    if(price!=null)return{price,name:(twName(ticker)||ticker),source:'Yahoo'};
  }catch(e){}
  return null;
}
async function fetchYahooQuote(sym){
  try{
    const d=await fetchJson('https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&range=1d');
    const m=d.chart&&d.chart.result&&d.chart.result[0]&&d.chart.result[0].meta;
    const price=m&&(m.regularMarketPrice||m.previousClose);
    if(price!=null)return{price,name:(m.longName||m.shortName||sym),source:'Yahoo'};
  }catch(e){}
  try{
    const stooq=sym.toLowerCase()+'.us';
    const csv=await fetchText('https://stooq.com/q/l/?s='+encodeURIComponent(stooq)+'&f=sd2t2ohlcv&h&e=csv');
    const lines=csv.trim().split(/\n/);
    if(lines.length>1){
      const cols=lines[1].split(',');
      const close=cleanPrice(cols[6]);
      if(close)return{price:close,name:sym,source:'Stooq'};
    }
  }catch(e){}
  return null;
}
async function fetchQuoteForStock(s){
  return s.market==='tw'?fetchTWQuote(s.ticker):fetchYahooQuote(s.ticker);
}
async function fetchAll() {
  if (!stocks.length) { renderAll(); return; }
  const ic = g('ricon'); ic.className = 'spin';
  setStatus('更新報價中...', false);
  const unique = {};
  stocks.forEach(function(s){ unique[getSymbol(s)] = {ticker:s.ticker, market:s.market}; });
  const items = Object.entries(unique);
  let ok = 0, fail = 0, failed = [];
  await Promise.all(items.map(async function(pair) {
    const sym = pair[0], s = pair[1];
    const q = await fetchQuoteForStock(s);
    if (q && q.price != null) { prices[sym] = q.price; quoteNames[sym] = (s.market==='tw'?(twName(s.ticker)||q.name||sym):(q.name||sym)); ok++; }
    else { fail++; failed.push(sym); }
  }));
  ic.className = '';
  const now = new Date();
  const t = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  setStatus(fail===0?'已更新 '+t:ok+'成功/'+fail+'失敗：'+failed.join('、'), fail>0);
  renderAll();
}

function setStatus(txt, err) { g('stxt').textContent=txt; g('sdot').className='sdot'+(err?' err':''); }

function uniqueGroups(list){ return groupStocks(list); }
function uniqueMarketCount(market){ return uniqueGroups(stocks.filter(function(s){return s.market===market;})).length; }

function renderSummary() {
  let totV=0, totC=0;
  const acc = { dad:{v:0,c:0,myV:0,myC:0,n:0,keys:new Set()}, mom:{v:0,c:0,n:0,keys:new Set()}, me:{v:0,c:0,n:0,keys:new Set()} };
  stocks.forEach(function(s) {
    const mv=getMV(s);
    const c=getCostTWD(s);
    const o=s.owner;
    if(acc[o]) acc[o].keys.add(s.ticker+'|'+s.owner);
    if(mv===null) return;
    totV+=mv; totC+=c;
    if(acc[o]){acc[o].v+=mv;acc[o].c+=c;}
    if(o==='dad'&&s.op_type==='mine'){acc.dad.myV+=mv;acc.dad.myC+=c;}
  });
  Object.keys(acc).forEach(function(k){acc[k].n=acc[k].keys.size;});
  const pnl=totV-totC, pct=totC>0?pnl/totC*100:0, sc=pnlCls(pnl);
  g('s-total').textContent=stocks.length?'$'+fmt(totV):'—';
  const pe=g('s-pnl'); pe.textContent=stocks.length?sign(pnl)+'$'+fmt(Math.abs(pnl)):'—'; pe.className='val '+sc;
  const ppe=g('s-pct'); ppe.textContent=stocks.length?sign(pnl)+pct.toFixed(1)+'%':''; ppe.className='sub '+sc;
  g('s-count').textContent=uniqueGroups(stocks).length;
  g('s-mkt').textContent='台股 '+uniqueMarketCount('tw')+' ／ 美股 '+uniqueMarketCount('us');
  const now=new Date();
  g('s-time').textContent=(now.getMonth()+1)+'/'+now.getDate()+' '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const myPnl=acc.dad.myV-acc.dad.myC, myPct=acc.dad.myC>0?myPnl/acc.dad.myC*100:0, ms=sign(myPnl), mc=pnlCls(myPnl);
  g('op-cost').textContent=acc.dad.myC>0?'$'+fmt(acc.dad.myC):'—';
  g('op-val').textContent=acc.dad.myV>0?'$'+fmt(acc.dad.myV):'—';
  const ope=g('op-pnl'); ope.textContent=acc.dad.myC>0?ms+'$'+fmt(Math.abs(myPnl)):'—'; ope.className='val '+mc;
  const oppe=g('op-pct'); oppe.textContent=acc.dad.myC>0?ms+myPct.toFixed(1)+'%':''; oppe.className=mc;
  const dadPnl=acc.dad.v-acc.dad.c, dCls=pnlCls(dadPnl);
  g('a-dad-n').textContent=acc.dad.n+' 檔';
  g('a-dad-val').textContent=acc.dad.n?'$'+fmt(acc.dad.v):'—';
  const dpe=g('a-dad-pnl'); dpe.textContent=acc.dad.n?sign(dadPnl)+'$'+fmt(Math.abs(dadPnl)):'—'; dpe.className='v '+dCls;
  const dop=g('a-dad-op');
  if(acc.dad.myC>0){dop.textContent=ms+'$'+fmt(Math.abs(myPnl))+' ('+ms+myPct.toFixed(1)+'%)';dop.className='oval '+mc;}
  else{dop.textContent='—';dop.className='oval neu';}
  [['mom','a-mom'],['me','a-me']].forEach(function(pair){
    const o=pair[0],pre=pair[1],d=acc[o],opnl=d.v-d.c,oc=pnlCls(opnl);
    g(pre+'-n').textContent=d.n+' 檔';
    g(pre+'-val').textContent=d.n?'$'+fmt(d.v):'—';
    const pe2=g(pre+'-pnl'); pe2.textContent=d.n?sign(opnl)+'$'+fmt(Math.abs(opnl)):'—'; pe2.className='v '+oc;
    const ce=g(pre+'-cost'); if(ce) ce.textContent=d.n?'$'+fmt(d.c):'—';
  });
}

function groupStocks(list){
  const map={};
  list.forEach(function(s){
    const key=s.ticker+'|'+s.owner;
    if(!map[key]) map[key]={ticker:s.ticker,name:s.name||'',market:s.market,owner:s.owner,is_dca:false,batches:[],totalShares:0,totalCostTWD:0};
    const g=map[key];
    if(!g.name&&s.name)g.name=s.name;
    if(dcaChecked(s))g.is_dca=true;
    g.batches.push(s);
    g.totalShares+=s.shares;
    g.totalCostTWD+=getCostTWD(s);
  });
  return Object.values(map).map(function(g){g.batches.sort(function(a,b){return String(a.buy_date||a.created_at||'').localeCompare(String(b.buy_date||b.created_at||''));});return g;});
}
function renderTable() {
  const tbody=g('tbody');
  const filtered=curFilter==='all'?stocks.slice():stocks.filter(s=>s.market===curFilter);
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="9" class="empty">尚無資料</td></tr>';return;}
  const ownerLabel={dad:'爸爸',mom:'媽媽',me:'我'};
  const groups=groupStocks(filtered);
  let html='';
  groups.forEach(function(grp){
    const sym=grp.market==='tw'?grp.ticker+'.TW':grp.ticker;
    const p=prices[sym],isUS=grp.market==='us';
    const mv=p?(isUS?p*RATE:p)*grp.totalShares:null;
    const c=grp.totalCostTWD,pnl=mv!=null?mv-c:null;
    const pct=pnl!=null&&c>0?pnl/c*100:null;
    const sg=sign(pnl||0),cls=pnl!=null?pnlCls(pnl):'neu';
    const avgCost=grp.totalShares>0?grp.totalCostTWD/grp.totalShares:0;
    const avgCostOrig=isUS?avgCost/RATE:avgCost;
    const hasBatches=grp.batches.length>1;
    const gkey=grp.ticker+'|'+grp.owner;
    const isOpen=expandedGroups[gkey];
    html+=`<tr class="group-row" onclick="toggleGroup('${gkey}')">`+
      `<td><button class="expand-btn ${hasBatches?(isOpen?'open':''):''}" style="${hasBatches?'':'visibility:hidden'}">${hasBatches?'▶':''}</button></td>`+
      `<td><span style="font-weight:500">${grp.ticker}</span><span class="badge ${isUS?'us-b':'tw-b'}">${isUS?'美':'台'}</span>${grp.is_dca?'<span class="badge dca-b">定期定額</span>':''}<div style="font-size:11px;color:var(--text2);margin-top:2px">${displayName(grp.ticker,grp.market,grp.name,sym)}</div></td>`+
      `<td class="r">${p?(isUS?'$'+p.toFixed(2):fmt(p)):'—'}</td>`+
      `<td class="r" style="color:var(--text2)">${isUS?'$'+avgCostOrig.toFixed(2):fmt(avgCostOrig)}</td>`+
      `<td class="r">${fmt(grp.totalShares)}</td>`+
      `<td class="r">${mv!=null?'$'+fmt(mv):'—'}</td>`+
      `<td class="r ${cls}">${pnl!=null?sg+'$'+fmt(Math.abs(pnl)):'—'}</td>`+
      `<td class="r ${cls}">${pct!=null?sg+pct.toFixed(1)+'%':'—'}</td>`+
      `<td style="color:var(--text2)">${ownerLabel[grp.owner]||grp.owner}</td></tr>`;
    if(hasBatches&&isOpen){
      grp.batches.forEach(function(s){
        const bMV=p?(isUS?p*RATE:p)*s.shares:null;
        const bPnl=bMV!=null?bMV-getCostTWD(s):null;
        const bPct=bPnl!=null&&getCostTWD(s)>0?bPnl/getCostTWD(s)*100:null;
        const bsg=sign(bPnl||0),bcls=bPnl!=null?pnlCls(bPnl):'neu';
        html+=`<tr class="detail-row"><td></td><td style="padding-left:20px">買入日期：${formatDate(s.buy_date||s.created_at)}</td>`+
          `<td class="r">${p?(isUS?'$'+p.toFixed(2):fmt(p)):'—'}</td>`+
          `<td class="r">${isUS?'$'+s.cost.toFixed(2):fmt(s.cost)}</td>`+
          `<td class="r">${fmt(s.shares)}</td>`+
          `<td class="r">${bMV!=null?'$'+fmt(bMV):'—'}</td>`+
          `<td class="r ${bcls}">${bPnl!=null?bsg+'$'+fmt(Math.abs(bPnl)):'—'}</td>`+
          `<td class="r ${bcls}">${bPct!=null?bsg+bPct.toFixed(1)+'%':'—'}</td><td></td></tr>`;
      });
    }
  });
  tbody.innerHTML=html;
}
function toggleGroup(key){ expandedGroups[key]=!expandedGroups[key]; renderTable(); }

function renderAll(){renderSummary();renderTable();}

function filter(f,btn){
  curFilter=f;
  document.querySelectorAll('.toolbar .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

async function init(){
  setStatus('載入中...',false);
  try{
    await loadStocks();
    renderAll();
    if(stocks.length) await fetchAll();
    else setStatus('尚無持股資料',false);
  }catch(e){setStatus('載入失敗，請稍後再試',true);}
}

init();
setInterval(async function(){
  try{ await loadStocks(); await fetchAll(); }catch(e){}
}, 5*60*1000);
</script>
