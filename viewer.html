<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>家族投資組合</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f0efe8;color:#1a1a18;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif}.page{max-width:1100px;margin:auto;padding:24px 16px}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}h1{font-size:20px;margin:0;font-weight:600}h2{font-size:15px;margin:0 0 8px}.badge{font-size:11px;background:#e6f1fb;color:#0c447c;border-radius:8px;padding:2px 8px}.btn{border:.5px solid rgba(0,0,0,.18);background:#fff;border-radius:8px;padding:7px 13px;font-size:13px;cursor:pointer;color:#555}.btn:hover{background:#f7f7f5}.btn.primary{background:#1a1a18;color:white}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.actions.end{justify-content:flex-end}.status{font-size:12px;color:#777}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin:14px 0}.card{background:#fff;border:.5px solid rgba(0,0,0,.1);border-radius:12px;padding:13px}.lbl{font-size:12px;color:#666;margin-bottom:5px}.val{font-size:20px;font-weight:600}.sub{font-size:12px;color:#777;margin-top:2px}.pos{color:#1d9e75}.neg{color:#d85a30}.panel{background:#fff;border:.5px solid rgba(0,0,0,.1);border-radius:12px;padding:14px;margin-bottom:14px}.hint{font-size:12px;color:#666;line-height:1.6}.csvfmt{background:#f7f7f5;border:.5px solid rgba(0,0,0,.1);border-radius:8px;padding:10px;overflow:auto;font-size:11px}.toolbar{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:center;margin:14px 0 10px}.tabs{display:flex;gap:3px;flex-wrap:wrap}.tab{border:0;background:transparent;border-radius:20px;padding:5px 12px;font-size:12px;color:#666;cursor:pointer}.tab.active{background:#fff;color:#111;font-weight:600;box-shadow:0 0 0 .5px rgba(0,0,0,.18)}select,input{border:.5px solid rgba(0,0,0,.18);border-radius:8px;background:#fff;color:#111;padding:7px 9px;font-size:13px}.table-wrap{background:#fff;border:.5px solid rgba(0,0,0,.1);border-radius:12px;overflow:auto}table{width:100%;min-width:980px;border-collapse:collapse;font-size:12px}th{background:#f7f7f5;color:#666;text-align:left;padding:8px 10px;border-bottom:.5px solid rgba(0,0,0,.1);font-weight:600}td{padding:9px 10px;border-bottom:.5px solid rgba(0,0,0,.08);vertical-align:middle}th.r,td.r{text-align:right}.stock-name{font-size:11px;color:#777;margin-top:2px}.chip{display:inline-block;font-size:10px;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600}.tw{background:#e1f5ee;color:#085041}.us{background:#e6f1fb;color:#0c447c}.dca{background:#f0e6fb;color:#5b0cac}.legacy{background:#eee;color:#555}.sold{background:#fde8e1;color:#9d381d}.source{font-size:11px;color:#777}.arrow{border:0;background:transparent;cursor:pointer;color:#777;font-size:12px;transition:.15s}.arrow.open{transform:rotate(90deg)}.detail td{background:#f7f7f5;color:#666;font-size:11px}.empty{text-align:center;color:#999;padding:28px}.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:flex-start;justify-content:center;z-index:99;padding-top:30px;overflow:auto}.modal-bg.open{display:flex}.modal{background:#fff;border-radius:12px;padding:18px;width:92%;max-width:780px;margin-bottom:40px}.formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}.formgrid label{font-size:12px;color:#666;display:flex;flex-direction:column;gap:4px}@media(max-width:700px){.page{padding:18px 10px}.val{font-size:18px}}
</style>
</head>
<body>
<div class="page">
 <div class="top"><h1>家族投資組合 <span class="badge">查看</span></h1><div class="actions"><span class="status" id="status">載入中...</span><button class="btn" onclick="fetchAll()">更新最近收盤價</button></div></div>
 
 <div class="grid">
  <div class="card"><div class="lbl">家族總資產</div><div class="val" id="c_family">—</div><div class="sub">僅計目前持有</div></div>
  <div class="card"><div class="lbl">爸爸原始資產</div><div class="val" id="c_legacy">—</div><div class="sub">source=legacy</div></div>
  <div class="card"><div class="lbl">我的操盤部位</div><div class="val" id="c_trading">—</div><div class="sub">source=trading</div></div>
  <div class="card"><div class="lbl">我的操盤績效</div><div class="val" id="c_perf">—</div><div class="sub" id="c_perf_sub"></div></div>
  <div class="card"><div class="lbl">月份總損益</div><div class="val" id="c_month">—</div><div class="sub" id="c_month_sub">選擇月份後計算</div></div>
  <div class="card"><div class="lbl">持股檔數</div><div class="val" id="c_count">—</div><div class="sub">同代號多日期算 1 檔</div></div>
 </div>
 <div class="toolbar"><div class="tabs"><button class="tab active" onclick="setView('all',this)">全部</button><button class="tab" onclick="setView('trading',this)">操盤</button><button class="tab" onclick="setView('legacy',this)">爸爸舊股</button><button class="tab" onclick="setView('sold',this)">已出清</button></div><div class="actions"><label class="hint">月份 <select id="monthSel" onchange="renderAll()"><option value="all">全部</option></select></label></div></div>
 <div class="table-wrap"><table><thead><tr><th style="width:34px"></th><th>股票</th><th class="r">最近收盤</th><th class="r">加權成本</th><th class="r">股數</th><th class="r">市值</th><th class="r">損益</th><th class="r">損益%</th><th>分類</th></tr></thead><tbody id="tbody"><tr><td colspan="10" class="empty">載入中...</td></tr></tbody></table></div>
</div>

<script>
const SB_URL='https://nqauumyfpdqkkqfjxury.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xYXV1bXlmcGRxa2txZmp4dXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1Mjk4MDYsImV4cCI6MjA5NTEwNTgwNn0.j-Ql0_eDLiCLRDyEzbzjVtq4mw7ORdk9eLniDR7zyow';
const RATE=32.5;
let stocks=[],prices={},view='all',expanded={};
const IS_ADMIN=false;
function g(id){return document.getElementById(id)}
function fmt(n){return Math.round(Number(n)||0).toLocaleString('zh-TW')}
function money(n){return '$'+fmt(n)}
function sign(n){return n>=0?'+':'-'}
function cls(n){return n>=0?'pos':'neg'}
function num(v){const n=parseFloat(v);return isNaN(n)?0:n}
function isTrue(v){return v===true||String(v).toLowerCase()==='true'||String(v)==='1'||String(v)==='是'}
function normalize(s){
 const cost=num(s.cost), source=(s.source||'').trim() || (cost>0?'trading':'legacy');
 return {ticker:String(s.ticker||'').trim().toUpperCase(),name:String(s.name||'').trim(),buy_date:s.buy_date||'',market:(s.market||'tw').toLowerCase(),shares:num(s.shares),cost,owner:s.owner||'dad',is_dca:isTrue(s.is_dca),source,status:s.status||'holding',sell_date:s.sell_date||'',sell_price:s.sell_price===''?null:num(s.sell_price),id:s.id,created_at:s.created_at};
}
function dbPayload(s){return {ticker:s.ticker,name:s.name,buy_date:s.buy_date||null,market:s.market,shares:s.shares,cost:s.cost,owner:s.owner,is_dca:s.is_dca,source:s.source,status:s.status,sell_date:s.sell_date||null,sell_price:s.sell_price}}
function schemaHelp(e){return '資料庫欄位可能尚未新增。請確認 stocks 表有 source、status、sell_date、sell_price 欄位。\n\n原始錯誤：'+(e.message||e)}
async function api(method,path,body){
 const r=await fetch(SB_URL+'/rest/v1/'+path,{method,headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:method==='POST'?'return=representation':''},body:body?JSON.stringify(body):undefined});
 if(!r.ok)throw new Error(await r.text()); return method==='DELETE'?null:r.json();
}
async function loadStocks(){const data=await api('GET','stocks?select=*&order=created_at.asc');stocks=(data||[]).map(normalize)}
function symbol(s){return s.market==='tw'?s.ticker+'.TW':s.ticker}
function holding(s){return s.status!=='sold'}
function priceOf(s){return prices[symbol(s)]??null}
function costTWD(s){return (s.market==='us'?s.cost*RATE:s.cost)*s.shares}
function valueTWD(s){const p=priceOf(s);return p==null?0:(s.market==='us'?p*RATE:p)*s.shares}
function unrealized(s){return valueTWD(s)-costTWD(s)}
function realized(s){if(s.status!=='sold'||s.sell_price==null)return 0;return ((s.market==='us'?s.sell_price*RATE:s.sell_price)-(s.market==='us'?s.cost*RATE:s.cost))*s.shares}
async function fetchYahooClose(sym){
 try{const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&range=5d');const d=await r.json();const res=d.chart&&d.chart.result&&d.chart.result[0];if(!res)return null;const meta=res.meta||{};if(meta.previousClose)return meta.previousClose;const q=res.indicators&&res.indicators.quote&&res.indicators.quote[0];const closes=(q&&q.close||[]).filter(x=>x!=null);return closes.length?closes[closes.length-1]:null;}catch(e){return null}
}
async function fetchAll(){
 const syms=[...new Set(stocks.filter(holding).map(symbol))]; if(!syms.length){renderAll();return}
 g('status').textContent='更新最近收盤價中...';let ok=0,fail=[];
 for(const sym of syms){const p=await fetchYahooClose(sym);if(p!=null){prices[sym]=p;ok++;}else fail.push(sym)}
 const t=new Date().toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
 g('status').textContent=fail.length?`已更新 ${ok}，失敗：${fail.join(', ')}`:`已更新最近收盤價 ${t}`;
 renderAll();
}
function rowMonth(s){return (s.status==='sold'?s.sell_date:s.buy_date||'').slice(0,7)}
function fillMonths(){const sel=g('monthSel'),old=sel.value;const months=[...new Set(stocks.map(rowMonth).filter(Boolean))].sort().reverse();sel.innerHTML='<option value="all">全部</option>'+months.map(m=>`<option value="${m}">${m}</option>`).join('');if(months.includes(old))sel.value=old;}
function passes(s){const m=g('monthSel')?g('monthSel').value:'all';if(m!=='all'&&rowMonth(s)!==m)return false;if(view==='sold')return s.status==='sold';if(view==='trading')return s.source==='trading'&&s.status!=='sold';if(view==='legacy')return s.source==='legacy'&&s.status!=='sold';return true;}
function groupKey(s){return [s.ticker,s.owner,s.source,s.status].join('|')}
function groups(list){const m={};list.forEach(s=>{const k=groupKey(s);if(!m[k])m[k]={ticker:s.ticker,name:s.name,market:s.market,owner:s.owner,source:s.source,status:s.status,is_dca:false,items:[],shares:0,cost:0,value:0,realized:0};const g=m[k];g.items.push(s);g.shares+=s.shares;g.cost+=costTWD(s);g.value+=holding(s)?valueTWD(s):0;g.realized+=realized(s);if(s.is_dca)g.is_dca=true;if(!g.name&&s.name)g.name=s.name;});return Object.values(m)}
function calcCards(){
 const holdings=stocks.filter(holding); const family=holdings.reduce((a,s)=>a+valueTWD(s),0); const legacy=holdings.filter(s=>s.source==='legacy').reduce((a,s)=>a+valueTWD(s),0); const tradingH=holdings.filter(s=>s.source==='trading'); const tradingVal=tradingH.reduce((a,s)=>a+valueTWD(s),0); const tradingCost=tradingH.reduce((a,s)=>a+costTWD(s),0); const tradingUnreal=tradingH.reduce((a,s)=>a+unrealized(s),0); const tradingReal=stocks.filter(s=>s.source==='trading'&&s.status==='sold').reduce((a,s)=>a+realized(s),0); const perf=tradingUnreal+tradingReal; const perfPct=(tradingCost?perf/tradingCost*100:0);
 g('c_family').textContent=money(family);g('c_legacy').textContent=money(legacy);g('c_trading').textContent=money(tradingVal);const pe=g('c_perf');pe.textContent=sign(perf)+money(Math.abs(perf));pe.className='val '+cls(perf);g('c_perf_sub').textContent=`已實現 ${sign(tradingReal)}${money(Math.abs(tradingReal))}／未實現 ${sign(tradingUnreal)}${money(Math.abs(tradingUnreal))}`;
 const m=g('monthSel').value; const monthRows=m==='all'?stocks:stocks.filter(s=>rowMonth(s)===m); const monthReal=monthRows.filter(s=>s.status==='sold').reduce((a,s)=>a+realized(s),0); const monthUnreal=monthRows.filter(holding).reduce((a,s)=>a+unrealized(s),0); const monthTotal=monthReal+monthUnreal; const me=g('c_month');me.textContent=sign(monthTotal)+money(Math.abs(monthTotal));me.className='val '+cls(monthTotal);g('c_month_sub').textContent=(m==='all'?'全部月份':m)+`｜已實現 ${sign(monthReal)}${money(Math.abs(monthReal))}／未實現 ${sign(monthUnreal)}${money(Math.abs(monthUnreal))}`;
 const distinct=new Set(holdings.filter(s=>view==='all'||(view==='trading'?s.source==='trading':view==='legacy'?s.source==='legacy':true)).map(s=>s.ticker));g('c_count').textContent=distinct.size;
}
function renderTable(){
 const list=stocks.filter(passes); const gs=groups(list); const tbody=g('tbody'); if(!gs.length){tbody.innerHTML='<tr><td colspan="10" class="empty">尚無資料</td></tr>';return}
 let html=''; gs.forEach(gr=>{const id=groupKey(gr); const p=priceOf(gr)||0; const avg=gr.shares?gr.cost/gr.shares/(gr.market==='us'?RATE:1):0; const pnl=gr.status==='sold'?gr.realized:gr.value-gr.cost; const pct=gr.cost?pnl/gr.cost*100:0; const isSold=gr.status==='sold'; const priceText=isSold&&gr.items[0].sell_price!=null?gr.items[0].sell_price:(p? (gr.market==='us'?'$'+p.toFixed(2):p.toFixed(2)):'—'); const dcaCell=IS_ADMIN&&!isSold?`<td><label class="hint"><input type="checkbox" ${gr.is_dca?'checked':''} onchange="setGroupDCA('${id}',this.checked)"> 定期定額</label></td>`:(IS_ADMIN?'<td>—</td>':'');
 html+=`<tr><td><button class="arrow ${expanded[id]?'open':''}" onclick="toggle('${id}')">▶</button></td><td><b>${esc(gr.ticker)}</b><span class="chip ${gr.market==='tw'?'tw':'us'}">${gr.market==='tw'?'台':'美'}</span>${gr.is_dca?'<span class="chip dca">定期定額</span>':''}${gr.source==='legacy'?'<span class="chip legacy">爸爸舊股</span>':''}${isSold?'<span class="chip sold">已出清</span>':''}<div class="stock-name">${esc(gr.name||'')}</div></td><td class="r">${priceText}</td><td class="r">${gr.cost? (gr.market==='us'?'$'+avg.toFixed(2):avg.toFixed(2)):'0'}</td><td class="r">${fmt(gr.shares)}</td><td class="r">${isSold?'—':money(gr.value)}</td><td class="r ${cls(pnl)}">${sign(pnl)}${money(Math.abs(pnl))}</td><td class="r ${cls(pnl)}">${gr.cost?(sign(pnl)+Math.abs(pct).toFixed(1)+'%'):'—'}</td><td><span class="source">${gr.source==='trading'?'我的操盤':'爸爸舊股'}｜${isSold?'已出清':'持有'}</span></td>${dcaCell}</tr>`;
 if(expanded[id]){gr.items.forEach(s=>{const sp=s.sell_price==null?'':s.sell_price; const p2=s.status==='sold'?realized(s):unrealized(s); const d= s.status==='sold'?`賣出：${s.sell_date||'—'}／${sp}`:`買入：${s.buy_date||'—'}`; const adminDel=IS_ADMIN?` <button class="btn" onclick="delRow('${s.id}')">刪除</button>`:'';html+=`<tr class="detail"><td></td><td>${d}${adminDel}</td><td class="r">${s.status==='sold'?(s.sell_price??'—'):(priceOf(s)||'—')}</td><td class="r">${s.cost}</td><td class="r">${fmt(s.shares)}</td><td class="r">${s.status==='sold'?'—':money(valueTWD(s))}</td><td class="r ${cls(p2)}">${sign(p2)}${money(Math.abs(p2))}</td><td class="r">${costTWD(s)?(p2/costTWD(s)*100).toFixed(1)+'%':'—'}</td><td colspan="2">${esc(s.name||'')}</td></tr>`})}
 }); tbody.innerHTML=html;
}
function toggle(id){expanded[id]=!expanded[id];renderTable()}
function renderAll(){fillMonths();calcCards();renderTable()}
function setView(v,btn){view=v;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));btn.classList.add('active');renderAll()}
async function init(){try{g('status').textContent='載入中...';await loadStocks();fillMonths();renderAll();await fetchAll();}catch(e){g('status').textContent='載入失敗';alert(schemaHelp(e));}}

init();
</script>
</body></html>
